<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Таролог - Чаты</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #1a0b2e 0%, #2d1b4e 100%);
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        .header {
            background: rgba(212, 175, 55, 0.1);
            padding: 16px;
            text-align: center;
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
        }
        
        .header h1 {
            font-size: 18px;
            color: #d4af37;
            margin-bottom: 4px;
        }
        
        .header .status {
            font-size: 12px;
            color: #888;
        }
        
        .chat-list {
            padding: 16px;
        }
        
        .chat-item {
            background: rgba(212, 175, 55, 0.1);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .chat-item:hover {
            background: rgba(212, 175, 55, 0.2);
            transform: translateY(-2px);
        }
        
        .chat-item.active {
            border-color: #00ff00;
            background: rgba(0, 255, 0, 0.1);
        }
        
        .chat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        
        .chat-client-name {
            font-weight: 600;
            color: #d4af37;
            font-size: 16px;
        }
        
        .chat-time {
            font-size: 12px;
            color: #888;
        }
        
        .chat-preview {
            font-size: 14px;
            color: #ccc;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .chat-container {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, #1a0b2e 0%, #2d1b4e 100%);
            z-index: 1000;
            flex-direction: column;
        }
        
        .chat-container.active {
            display: flex;
        }
        
        .chat-header-bar {
            background: rgba(212, 175, 55, 0.2);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
        }
        
        .back-btn {
            background: none;
            border: none;
            color: #d4af37;
            font-size: 24px;
            cursor: pointer;
            padding: 4px;
        }
        
        .chat-title {
            flex: 1;
            font-size: 16px;
            color: #d4af37;
        }
        
        .timer {
            font-size: 14px;
            color: #fff;
            background: rgba(0, 0, 0, 0.3);
            padding: 4px 8px;
            border-radius: 12px;
        }
        
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.4;
        }
        
        .message.tarologist {
            align-self: flex-end;
            background: linear-gradient(135deg, #d4af37 0%, #f4e5c2 100%);
            color: #1a0b2e;
            border-bottom-right-radius: 4px;
        }
        
        .message.client {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border-bottom-left-radius: 4px;
        }
        
        .message-time {
            font-size: 11px;
            opacity: 0.7;
            margin-top: 4px;
        }
        
        .input-area {
            background: rgba(0, 0, 0, 0.3);
            padding: 12px 16px;
            display: flex;
            gap: 8px;
            border-top: 1px solid rgba(212, 175, 55, 0.3);
        }
        
        .message-input {
            flex: 1;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 24px;
            padding: 12px 16px;
            color: #fff;
            font-size: 14px;
            outline: none;
        }
        
        .message-input::placeholder {
            color: #888;
        }
        
        .send-btn {
            background: linear-gradient(135deg, #d4af37 0%, #f4e5c2 100%);
            border: none;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            cursor: pointer;
            font-size: 18px;
            color: #1a0b2e;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #888;
        }
        
        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #d4af37;
        }
        
        .online-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #00ff00;
            border-radius: 50%;
            margin-right: 6px;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>💬 Активные консультации</h1>
        <div class="status">
            <span class="online-indicator"></span>
            <span id="connection-status">Подключено</span>
        </div>
    </div>

    <div class="chat-list" id="chat-list">
        <div class="loading">Загрузка чатов...</div>
    </div>

    <div class="chat-container" id="chat-container">
        <div class="chat-header-bar">
            <button class="back-btn" onclick="closeChat()">←</button>
            <div class="chat-title" id="chat-title">Клиент</div>
            <div class="timer" id="timer">25:00</div>
        </div>
        
        <div class="messages-container" id="messages"></div>
        
        <div class="input-area">
            <input type="text" class="message-input" id="message-input" placeholder="Введите сообщение..." onkeypress="handleKeyPress(event)">
            <button class="send-btn" id="send-btn" onclick="sendMessage()">➤</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        const API_BASE = '/api';
        let socket = null;
        let currentSession = null;
        let tarologistId = null;
        let chats = [];

        // Инициализация
        async function init() {
            try {
                // Получаем данные таролога
                const response = await fetch(`${API_BASE}/tarologist/me`, {
                    headers: {
                        'x-telegram-init-data': tg.initData
                    }
                });
                
                if (!response.ok) {
                    throw new Error('Не удалось получить данные таролога');
                }
                
                const data = await response.json();
                tarologistId = data.data.id;
                
                // Подключаемся к WebSocket
                connectSocket();
                
                // Загружаем чаты
                loadChats();
                
            } catch (error) {
                console.error('Ошибка инициализации:', error);
                document.getElementById('chat-list').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">❌</div>
                        <div>Ошибка загрузки. Попробуйте позже.</div>
                    </div>
                `;
            }
        }

        // Подключение к WebSocket
        function connectSocket() {
            socket = io();
            
            socket.on('connect', () => {
                console.log('✅ WebSocket подключен');
                document.getElementById('connection-status').textContent = 'Подключено';
                
                // Отправляем heartbeat
                if (tarologistId) {
                    socket.emit('tarologist-connect', {
                        tarologistId: tarologistId,
                        initData: tg.initData
                    });
                }
            });
            
            socket.on('disconnect', () => {
                console.log('❌ WebSocket отключен');
                document.getElementById('connection-status').textContent = 'Отключено';
            });
            
            socket.on('new-message', (message) => {
                if (currentSession && message.sessionId === currentSession.id) {
                    displayMessage(message);
                } else {
                    // Обновляем список чатов
                    loadChats();
                }
            });
            
            // 🔴 КРИТИЧНО: Ответ на heartbeat от сервера
            socket.on('tarologist-ping', () => {
                console.log('💓 Получен ping от сервера, отправляю pong...');
                socket.emit('tarologist-pong');
            });
            
            // Получаем статус от сервера
            socket.on('tarologist-status', (data) => {
                console.log('📊 Статус таролога:', data);
            });
        }

        // Загрузка списка чатов
        async function loadChats() {
            try {
                const response = await fetch(`${API_BASE}/tarologist/sessions/active`, {
                    headers: {
                        'x-telegram-init-data': tg.initData
                    }
                });
                
                if (!response.ok) throw new Error('Ошибка загрузки чатов');
                
                const data = await response.json();
                chats = data.data || [];
                
                renderChats();
            } catch (error) {
                console.error('Ошибка загрузки чатов:', error);
            }
        }

        // Отображение списка чатов
        function renderChats() {
            const container = document.getElementById('chat-list');
            
            if (chats.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">💬</div>
                        <div>Нет активных консультаций</div>
                        <div style="font-size: 12px; margin-top: 8px;">
                            Когда клиент оплатит консультацию,<br>
                            чат появится здесь
                        </div>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = chats.map(chat => `
                <div class="chat-item" onclick="openChat(${chat.id})">
                    <div class="chat-header">
                        <div class="chat-client-name">Клиент #${chat.user_id}</div>
                        <div class="chat-time">${formatTime(chat.start_time)}</div>
                    </div>
                    <div class="chat-preview">
                        ${chat.last_message || 'Нет сообщений'}
                    </div>
                </div>
            `).join('');
        }

        // Открытие чата
        async function openChat(sessionId) {
            currentSession = chats.find(c => c.id === sessionId);
            if (!currentSession) return;
            
            document.getElementById('chat-title').textContent = `Клиент #${currentSession.user_id}`;
            document.getElementById('chat-container').classList.add('active');
            
            // Подключаемся к сессии
            socket.emit('join-session', {
                sessionId: sessionId,
                userId: tarologistId,
                userType: 'tarologist'
            });
            
            // Загружаем историю сообщений
            loadMessages(sessionId);
            
            // Запускаем таймер
            startTimer();
        }

        // Закрытие чата
        function closeChat() {
            document.getElementById('chat-container').classList.remove('active');
            currentSession = null;
            
            if (socket) {
                socket.emit('leave-session');
            }
        }

        // Загрузка сообщений
        async function loadMessages(sessionId) {
            try {
                const response = await fetch(`${API_BASE}/chat/session/${sessionId}/messages`, {
                    headers: {
                        'x-telegram-init-data': tg.initData
                    }
                });
                
                if (!response.ok) throw new Error('Ошибка загрузки сообщений');
                
                const data = await response.json();
                const messages = data.data || [];
                
                const container = document.getElementById('messages');
                container.innerHTML = '';
                
                messages.forEach(msg => displayMessage(msg));
                
                // Прокрутка вниз
                container.scrollTop = container.scrollHeight;
            } catch (error) {
                console.error('Ошибка загрузки сообщений:', error);
            }
        }

        // Отображение сообщения
        function displayMessage(message) {
            const container = document.getElementById('messages');
            const isTarologist = message.sender_type === 'tarologist';
            
            const div = document.createElement('div');
            div.className = `message ${isTarologist ? 'tarologist' : 'client'}`;
            div.innerHTML = `
                <div>${escapeHtml(message.text)}</div>
                <div class="message-time">${formatTime(message.timestamp || message.created_at)}</div>
            `;
            
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        // Отправка сообщения
        function sendMessage() {
            const input = document.getElementById('message-input');
            const text = input.value.trim();
            
            if (!text || !currentSession || !socket) return;
            
            socket.emit('send-message', {
                sessionId: currentSession.id,
                text: text,
                senderId: tarologistId,
                senderType: 'tarologist'
            });
            
            input.value = '';
        }

        // Обработка нажатия Enter
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        // Таймер сессии
        function startTimer() {
            if (!currentSession) return;
            
            const startTime = new Date(currentSession.start_time).getTime();
            const duration = 25 * 60 * 1000; // 25 минут
            
            const timerEl = document.getElementById('timer');
            
            const interval = setInterval(() => {
                if (!currentSession) {
                    clearInterval(interval);
                    return;
                }
                
                const elapsed = Date.now() - startTime;
                const remaining = Math.max(0, duration - elapsed);
                
                const minutes = Math.floor(remaining / 60000);
                const seconds = Math.floor((remaining % 60000) / 1000);
                
                timerEl.textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
                
                if (remaining <= 0) {
                    clearInterval(interval);
                    timerEl.textContent = 'Время истекло';
                    timerEl.style.color = '#ff4444';
                }
            }, 1000);
        }

        // Вспомогательные функции
        function formatTime(timestamp) {
            if (!timestamp) return '';
            const date = new Date(timestamp);
            return date.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Запуск
        init();
        
        // Обновление списка чатов каждые 30 секунд
        setInterval(loadChats, 30000);
    </script>
</body>
</html>
